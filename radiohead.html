    <style>
    .radiohead-page {
        min-height: 100vh;
        transition: background 0.6s ease;
    }

    /* Album selector bar */
    .album-bar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--rh-bg, #f5f2ed);
        border-bottom: 2px solid var(--rh-color, #b8442a);
        transition: background 0.6s ease, border-color 0.6s ease;
        padding: 12px 16px;
    }
    .album-bar__inner {
        max-width: 800px;
        margin: 0 auto;
        display: flex;
        gap: 6px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-bottom: 4px;
    }
    .album-bar__inner::-webkit-scrollbar { display: none; }
    .album-tab {
        flex-shrink: 0;
        padding: 8px 14px;
        border-radius: 20px;
        border: 1.5px solid transparent;
        background: transparent;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--rh-text, #3d3832);
        cursor: pointer;
        transition: all 0.3s ease;
        white-space: nowrap;
        opacity: 0.6;
    }
    .album-tab:hover { opacity: 0.85; }
    .album-tab--active {
        opacity: 1;
        background: var(--rh-color, #b8442a);
        color: #fff;
        border-color: var(--rh-color, #b8442a);
    }

    /* Page header */
    .rh-header {
        max-width: 800px;
        margin: 0 auto;
        padding: 32px clamp(20px, 4vw, 48px) 8px;
    }
    .rh-header__title {
        font-family: 'Newsreader', Georgia, serif;
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 700;
        color: var(--text-bright);
        line-height: 0.95;
        letter-spacing: -0.02em;
    }
    .rh-header__sub {
        font-family: 'Newsreader', Georgia, serif;
        font-style: italic;
        font-size: clamp(0.85rem, 2vw, 1rem);
        color: var(--text-muted);
        line-height: 1.6;
        max-width: 55ch;
        margin-top: 8px;
    }

    /* Album section */
    .album-section {
        max-width: 800px;
        margin: 0 auto;
        padding: 24px clamp(20px, 4vw, 48px) 100px;
        display: none;
        animation: fadeSlide 0.3s ease both;
    }
    .album-section--active { display: block; }

    .album-title-block {
        display: flex;
        align-items: flex-end;
        gap: 20px;
        margin-bottom: 28px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--line-strong);
    }
    .album-art-container {
        flex-shrink: 0;
        width: 120px;
        height: 120px;
        border-radius: 4px;
        overflow: hidden;
        background: var(--rh-color, #888);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.6s ease;
    }
    .album-art-container svg {
        width: 100%;
        height: 100%;
    }
    .album-title-block__info { flex: 1; }
    .album-title-block__name {
        font-family: 'Newsreader', Georgia, serif;
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        font-weight: 700;
        color: var(--rh-color, #b8442a);
        line-height: 0.95;
        letter-spacing: -0.02em;
        transition: color 0.6s ease;
    }
    .album-title-block__year {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.8rem;
        color: var(--text-dim);
        margin-top: 4px;
    }
    .album-title-block__count {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.72rem;
        color: var(--text-dim);
        margin-top: 6px;
    }

    /* Track list */
    .track-list { list-style: none; }
    .track-item {
        display: grid;
        grid-template-columns: 28px 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 12px 16px;
        border-radius: 8px;
        transition: background 0.2s ease;
    }
    .track-item:hover { background: var(--rh-bg, #f5f2ed); }
    .track-item--playing {
        background: var(--rh-bg, #f5f2ed);
        border-left: 3px solid var(--rh-color, #b8442a);
        padding-left: 13px;
    }
    .track-num {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-dim);
        text-align: right;
    }
    .track-item--playing .track-num {
        color: var(--rh-color, #b8442a);
    }
    .track-name {
        font-family: 'Newsreader', Georgia, serif;
        font-size: 1rem;
        color: var(--text-bright);
        line-height: 1.3;
    }
    .track-item--playing .track-name {
        color: var(--rh-color, #b8442a);
        font-weight: 600;
    }
    .track-play-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        background: var(--rh-color, #b8442a);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        color: #fff;
        flex-shrink: 0;
        opacity: 0.7;
    }
    .track-play-btn:hover {
        opacity: 1;
        transform: scale(1.08);
    }
    .track-play-btn--playing {
        opacity: 1;
    }
    .track-play-btn svg {
        width: 14px;
        height: 14px;
        display: block;
    }

    /* Progress bar */
    .progress-section {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: var(--bg);
        border-top: 1px solid var(--line-strong);
        transition: background 0.6s ease;
    }
    .progress-section--hidden { display: none; }
    .progress-inner {
        max-width: 800px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px clamp(20px, 4vw, 48px);
    }
    .progress-now-play {
        font-family: 'Newsreader', Georgia, serif;
        font-style: italic;
        font-size: 0.85rem;
        color: var(--rh-text, #b8442a);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 160px;
        transition: color 0.6s ease;
    }
    .progress-bar-wrap {
        flex: 1;
        height: 6px;
        background: var(--line);
        border-radius: 3px;
        cursor: pointer;
        overflow: hidden;
    }
    .progress-bar-fill {
        height: 100%;
        width: 0%;
        background: var(--rh-color, #b8442a);
        border-radius: 3px;
        transition: width 0.15s linear;
    }
    .progress-time {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.7rem;
        color: var(--text-dim);
        min-width: 80px;
        text-align: right;
    }

    /* Waveform bars for teaser */
    .rh-teaser__bars {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 3px;
        height: 80px;
        margin-bottom: 20px;
    }
    .rh-teaser__bars span {
        display: block;
        width: 3px;
        border-radius: 2px;
        background: var(--text-dim);
        transform-origin: bottom;
        animation: wave 2s ease-in-out infinite;
    }
    .featured-video:hover .rh-teaser__bars span {
        background: var(--accent);
        animation-duration: 1s;
    }
    .rh-teaser__text {
        font-family: 'Newsreader', Georgia, serif;
        font-size: clamp(0.88rem, 2vw, 1rem);
        color: var(--text-muted);
        line-height: 1.55;
        margin-bottom: 16px;
        text-align: center;
        font-style: italic;
    }
    .rh-teaser__cta {
        display: inline-block;
        padding: 8px 20px;
        border: 1.5px solid var(--accent);
        border-radius: 999px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.75rem;
        color: var(--accent);
        text-decoration: none;
        letter-spacing: 0.04em;
        transition: background 0.2s ease, color 0.2s ease;
    }
    .rh-teaser__cta:hover {
        background: var(--accent);
        color: #fff;
    }

    @keyframes wave {
        0%, 100% { transform: scaleY(0.25); }
        50% { transform: scaleY(1); }
    }

    @media (max-width: 600px) {
        .album-art-container { width: 80px; height: 80px; }
        .album-title-block { gap: 14px; }
        .track-item { padding: 10px 12px; gap: 8px; }
        .track-name { font-size: 0.9rem; }
        .progress-now-play { max-width: 100px; }
    }
    </style>
</head>

                    '<circle cx="60" cy="58" r="10" fill="#7A8A4A" opacity="0.28"/>' +
                    '<circle cx="60" cy="58" r="4" fill="#4A5A2A" opacity="0.2"/>' +
                    '<text x="60" y="96" text-anchor="middle" font-family="monospace" font-size="4" fill="#7A8A4A" opacity="0.5">king of limbs</text>' +
                    '</svg>';
            case "A Moon Shaped Pool":
                return '<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">' +
                    '<rect width="120" height="120" fill="#F0F4F8"/>' +
                    '<circle cx="60" cy="42" r="16" fill="none" stroke="#8A9ABA" stroke-width="1" opacity="0.45"/>' +
                    '<circle cx="60" cy="42" r="10" fill="#8A9ABA" opacity="0.12"/>' +
                    '<path d="M30,76 Q60,66 90,76" fill="none" stroke="#8A9ABA" stroke-width="0.5" opacity="0.35"/>' +
                    '<path d="M26,82 Q60,72 94,82" fill="none" stroke="#8A9ABA" stroke-width="0.5" opacity="0.28"/>' +
                    '<path d="M22,88 Q60,78 98,88" fill="none" stroke="#8A9ABA" stroke-width="0.5" opacity="0.2"/>' +
                    '<text x="60" y="104" text-anchor="middle" font-family="monospace" font-size="4" fill="#8A9ABA" opacity="0.5">moon shaped pool</text>' +
                    '</svg>';
            default:
                return '<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"><rect width="120" height="120" fill="#888"/></svg>';
        }
    }

    // ===== BUILD =====
    var audioEl = document.getElementById('audioEl');
    var currentAlbum = null;
    var currentTrack = null;
    var currentTrackIndex = 0;
    var isPlaying = false;

    function slug(name) { return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }

    function playSvg() { return '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="7,5 19,12 7,19"/></svg>'; }
    function pauseSvg() { return '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>'; }

    function buildAlbumBar() {
        var bar = document.getElementById('albumBar');
        var html = '';
        ALBUMS.forEach(function(album) {
            html += '<button class="album-tab" data-album="' + slug(album.name) + '" data-color="' + album.color + '">' + album.name + '</button>';
        });
        bar.innerHTML = html;
        bar.addEventListener('click', function(e) {
            var btn = e.target.closest('.album-tab');
            if (btn) selectAlbum(btn.dataset.album);
        });
    }

    function buildAlbumSections() {
        var container = document.getElementById('albumSections');
        var html = '';
        ALBUMS.forEach(function(album) {
            var s = slug(album.name);
            html += '<div class="album-section" id="section-' + s + '" data-album="' + s + '">';
            html += '<div class="album-title-block">';
            html += '<div class="album-art-container">' + albumArt(album) + '</div>';
            html += '<div class="album-title-block__info">';
            html += '<div class="album-title-block__name">' + album.name + '</div>';
            html += '<div class="album-title-block__year">' + album.year + '</div>';
            html += '<div class="album-title-block__count">' + album.tracks.length + ' track' + (album.tracks.length > 1 ? 's' : '') + '</div>';
            html += '</div></div>';
            html += '<ul class="track-list">';
            album.tracks.forEach(function(track, j) {
                html += '<li class="track-item" data-album="' + s + '" data-track="' + track.replace(/"/g, '&quot;') + '" data-index="' + (j + 1) + '">';
                html += '<span class="track-num">' + (j + 1) + '</span>';
                html += '<span class="track-name">' + track + '</span>';
                html += '<button class="track-play-btn" data-album="' + s + '" data-track="' + track.replace(/"/g, '&quot;') + '" aria-label="Play">' + playSvg() + '</button>';
                html += '</li>';
            });
            html += '</ul></div>';
        });
        container.innerHTML = html;
        container.addEventListener('click', function(e) {
            var btn = e.target.closest('.track-play-btn');
            if (btn) playTrack(btn.dataset.album, btn.dataset.track);
        });
    }

    function selectAlbum(slugKey) {
        var album = ALBUMS.find(function(a) { return slug(a.name) === slugKey; });
        if (!album) return;

        currentAlbum = slugKey;
        document.documentElement.style.setProperty('--rh-color', album.color);
        document.documentElement.style.setProperty('--rh-text', album.text);
        document.documentElement.style.setProperty('--rh-bg', album.bg);

        document.querySelectorAll('.album-tab').forEach(function(tab) {
            tab.classList.toggle('album-tab--active', tab.dataset.album === slugKey);
        });

        document.querySelectorAll('.album-section').forEach(function(section) {
            section.classList.toggle('album-section--active', section.dataset.album === slugKey);
        });

        var activeTab = document.querySelector('.album-tab--active');
        if (activeTab) {
            activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
    }

    function getR2Url(trackName) {
        var mapped = TRACK_FILE_MAP[trackName] || trackName;
        return R2_BASE + encodeURIComponent(mapped + '.mp3');
    }

    function playTrack(slugKey, trackName) {
        var album = ALBUMS.find(function(a) { return slug(a.name) === slugKey; });
        var trackIndex = album.tracks.indexOf(trackName);
        var url = getR2Url(trackName);

        // Toggle if clicking the same playing track
        if (currentTrack === trackName && isPlaying) {
            audioEl.pause();
            isPlaying = false;
            updatePlayState();
            updateProgressDisplay();
            return;
        }

        currentAlbum = slugKey;
        currentTrack = trackName;
        currentTrackIndex = trackIndex;

        if (currentAlbum !== slugKey) selectAlbum(slugKey);

        audioEl.src = url;
        audioEl.play();
        isPlaying = true;

        document.getElementById('progressSection').classList.remove('progress-section--hidden');
        document.getElementById('nowPlay').textContent = trackName;

        updatePlayState();
        highlightTrack(slugKey, trackName);
    }

    function highlightTrack(slugKey, trackName) {
        document.querySelectorAll('.track-item').forEach(function(item) {
            item.classList.remove('track-item--playing');
            var btn = item.querySelector('.track-play-btn');
            if (btn) btn.innerHTML = playSvg();
            if (btn) btn.classList.remove('track-play-btn--playing');
        });

        var item = document.querySelector('.track-item[data-album="' + slugKey + '"][data-track="' + trackName.replace(/"/g, '&quot;') + '"]');
        if (item) {
            item.classList.add('track-item--playing');
            var btn = item.querySelector('.track-play-btn');
            btn.innerHTML = isPlaying ? pauseSvg() : playSvg();
            btn.classList.toggle('track-play-btn--playing', isPlaying);
            item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    function updatePlayState() {
        var activeItem = document.querySelector('.track-item--playing');
        if (activeItem) {
            var btn = activeItem.querySelector('.track-play-btn');
            if (btn) btn.innerHTML = isPlaying ? pauseSvg() : playSvg();
        }
    }

    function playNext() {
        var album = ALBUMS.find(function(a) { return slug(a.name) === currentAlbum; });
        if (!album) return;
        var nextIndex = album.tracks.indexOf(currentTrack) + 1;
        if (nextIndex < album.tracks.length) {
            playTrack(currentAlbum, album.tracks[nextIndex]);
        } else {
            isPlaying = false;
            updatePlayState();
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressTime').textContent = '0:00 / 0:00';
            document.getElementById('nowPlay').textContent = '—';
        }
    }

    // Audio events
    audioEl.addEventListener('timeupdate', function() {
        if (audioEl.duration && !isNaN(audioEl.duration)) {
            var pct = (audioEl.currentTime / audioEl.duration) * 100;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressTime').textContent =
                formatTime(audioEl.currentTime) + ' / ' + formatTime(audioEl.duration);
        }
    });

    audioEl.addEventListener('ended', function() {
        playNext();
    });

    audioEl.addEventListener('pause', function() {
        isPlaying = false;
        updatePlayState();
    });

    audioEl.addEventListener('play', function() {
        isPlaying = true;
        updatePlayState();
    });

    // Seek bar
    document.getElementById('progressWrap').addEventListener('click', function(e) {
        if (audioEl.duration && !isNaN(audioEl.duration)) {
            var rect = this.getBoundingClientRect();
            var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            audioEl.currentTime = pct * audioEl.duration;
        }
    });

    function formatTime(s) {
        if (isNaN(s)) return '0:00';
        var m = Math.floor(s / 60);
        var sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function updateProgressDisplay() {
        if (!isPlaying) {
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressTime').textContent = '0:00 / 0:00';
        }
    }

    // Init
    buildAlbumBar();
    buildAlbumSections();
    selectAlbum('ok-computer');
    </script>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var s = document.createElement('script');
        var t = new Date().getTime();
        s.src = 'https://script.google.com/macros/s/AKfycbwOYJRKO_zOwkLpCR4U_ENMiD7bgPtuWmXVe6ZTuT913aTHJ0c5Op3OEdfzJQAGUHdv/exec?action=increment&callback=displayCount&t=' + t;
        document.body.appendChild(s);
    });
    </script>
</body>
