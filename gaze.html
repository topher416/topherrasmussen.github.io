    <div id="wrapper">
        <canvas id="c"></canvas>
        <div id="ui-top"><span id="ui-run">run 1</span> &middot; room <span id="ui-room">1</span></div>
        <div id="room-text"></div>
        <div id="touch-controls">

        <div id="title-screen">
            <h1>The Gaze</h1>
            <p>you move through rooms the arrangement shifts each time you look. don't catch your reflection. don't stop moving.</p>
            <button class="pill-btn" id="start-btn">begin</button>
        </div>

        </div>

    <div class="counter">Visitor count: <span class="counter-display">00000000</span></div>
    <script>
    window.displayCount = function (count) {
        var el = document.querySelector('.counter-display');
        if (el) el.textContent = count.toString().padStart(8, '0');
    };
    document.addEventListener('DOMContentLoaded', function () {
        var s = document.createElement('script');
        s.src = 'https://script.google.com/macros/s/AKfycbwOYJRKO_zOwkLpCR4U_ENMiD7bgPtuWmXVe6ZTuT913aTHJ0c5Op3OEdfzJQAGUHdv/exec?action=increment&callback=displayCount&t=' + Date.now();
        document.body.appendChild(s);
    });
    </script>

    <script>
    // Simple seeded RNG
    function rng(seed) {
        var s = seed || Date.now();
        return function() {
            s = (s * 16807 + 0) % 2147483647;
            return (s - 1) / 2147483646;
        };
    }

    var TILE = 28;
    var RW = 24, RH = 14;
    var VW, VH;
    var seed = 0, run = 1, room = 0;
    var state = 'title'; // title, playing, dead
    var map = [];
    var elements = [];
    var exits = [];
    var player = { x: 0, y: 0, dx: 0, dy: 0, dir: 1, looking: true };
    var cam = { x: 0, y: 0 };
    var frame = 0;
    var moveTimer = 0, moveCD = 140;
    var gazeT = 0, gazeOn = false, gazeX = 0, gazeY = 0;
    var deathMsg = '';
    var roomType = '';
    var texts = [
        "the mirror stage",
        "desire is the desire of the Other",
        "the unconscious is structured like a language",
        "there is no sexual relationship",
        "the real resists symbolization",
        "objet petit a — the cause of desire",
        "you are looking at me from a point where I am not",
        "lack is the condition of desire",
        "the gaze is not a look but a disturbance"
    ];
    var keys = {};
    var tkeys = {};
    var r = rng();

    var canvas = document.getElementById('c');
    var ctx = canvas.getContext('2d');

    function resize() {
        var maxW = Math.min(window.innerWidth - 32, 672);
        var maxH = Math.min(window.innerHeight - 140, 392);
        canvas.width = maxW - (maxW % TILE);
        canvas.height = maxH - (maxH % TILE);
        VW = canvas.width / TILE;
        VH = canvas.height / TILE;
    }
    window.addEventListener('resize', resize);
    resize();

    function makeMap() {
        map = [];
        for (var y = 0; y < RH; y++) {
            map[y] = [];
            for (var x = 0; x < RW; x++) {
                if (y === 0 || y === RH - 1 || x === 0 || x === RW - 1) {
                    map[y][x] = 1;
                } else {
                    map[y][x] = r() > 0.65 ? 1 : 0;
                }
            }
        }
        // Carve open paths (simple corridor carving)
        // Horizontal corridor through middle
        var midY = Math.floor(RH / 2);
        for (var x = 1; x < RW - 1; x++) {
            map[midY][x] = 0;
            if (midY > 1) map[midY - 1][x] = r() > 0.3 ? 0 : 1;
            if (midY < RH - 2) map[midY + 1][x] = r() > 0.3 ? 0 : 1;
        }
        // Vertical corridors at thirds
        for (var q = 1; q < RW - 1; q += Math.floor((RW - 2) / 2)) {
            for (var yy = 1; yy < RH - 1; yy++) {
                map[yy][q] = 0;
                if (q > 0) map[yy][q - 1] = r() > 0.5 ? 0 : 1;
                if (q < RW - 2) map[yy][q + 1] = r() > 0.5 ? 0 : 1;
            }
        }
        // Random open rooms
        for (var i = 0; i < 4; i++) {
            var sx = 2 + Math.floor(r() * (RW - 6));
            var sy = 2 + Math.floor(r() * (RH - 6));
            var sw = 2 + Math.floor(r() * 3);
            var sh = 2 + Math.floor(r() * 3);
            for (var ry = sy; ry < sy + sh && ry < RH - 1; ry++)
                for (var rx = sx; rx < sx + sw && rx < RW - 1; rx++)
                    map[ry][rx] = 0;
        }

        // Place player at top-left open space
        player.x = 1; player.y = 1;
        while (map[player.y][player.x] === 1) { player.x++; if (player.x > RW - 2) { player.x = 1; player.y++; } }

        // Room types
        var types = ['mirror', 'drive', 'gaze', 'empty'];
        roomType = types[Math.floor(r() * types.length)];

        elements = [];

        if (roomType === 'mirror') {
            // Place mirror somewhere reachable
            elements.push({ type: 'mirror', x: Math.floor(RW * 0.75), y: midY });
            // Mirror reflection that follows player slowly
            elements.push({ type: 'reflection', x: player.x + 5, y: player.y });
        } else if (roomType === 'drive') {
            elements.push({ type: 'objet', x: Math.floor(RW * 0.7), y: midY, shift: 0 });
        } else if (roomType === 'gaze') {
            gazeOn = false; gazeT = 0;
        }

        // Place text fragments
        if (r() > 0.3) {
            var tx, ty, attempts = 0;
            do {
                tx = 2 + Math.floor(r() * (RW - 4));
                ty = 2 + Math.floor(r() * (RH - 4));
                attempts++;
            } while (map[ty][tx] === 1 && attempts < 20);
            if (map[ty][tx] === 0) {
                elements.push({ type: 'text', x: tx, y: ty, text: texts[Math.floor(r() * texts.length)], read: false });
            }
        }

        // Place exit
        var ex = RW - 2, ey = midY;
        while (map[ey][ex] === 1 && ey > 1) ey--;
        exits = [{ x: ex, y: ey }];
    }

    function lookScratch(ctx, x, y, w, h, density, color) {
        var lines = Math.floor(density * Math.min(w, h));
        for (var i = 0; i < lines; i++) {
            var angle = r() * Math.PI;
            var len = r() * Math.min(w, h) * 0.7;
            var cx = x + r() * w;
            var cy = y + r() * h;
            var steps = Math.floor(len / 2);
            ctx.strokeStyle = color || 'rgba(26,24,22,0.25)';
            ctx.lineWidth = 0.3 + r() * 1;
            ctx.beginPath();
            ctx.moveTo(cx + (r() - 0.5) * 1, cy + (r() - 0.5) * 1);
            ctx.lineTo(cx + Math.cos(angle) * len + (r() - 0.5) * 1, cy + Math.sin(angle) * len + (r() - 0.5) * 1);
            ctx.stroke();
        }
    }

    function drawWall(ctx, px, py) {
        ctx.fillStyle = 'rgba(61,56,50,0.08)';
        ctx.fillRect(px, py, TILE, TILE);
        lookScratch(ctx, px, py, TILE, TILE, 0.35);
        // Ink bleed edges
        for (var i = 0; i < 3; i++) {
            ctx.strokeStyle = 'rgba(26,24,22,0.15)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(px + r() * TILE, py);
            ctx.lineTo(px + r() * TILE, py + TILE);
            ctx.stroke();
        }
    }

    function drawFloor(ctx, px, py) {
        ctx.fillStyle = '#f5f2ed';
        ctx.fillRect(px, py, TILE, TILE);
        if (r() < 0.08) {
            ctx.strokeStyle = 'rgba(61,56,50,0.06)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(px + r() * TILE, py + r() * TILE);
            ctx.lineTo(px + r() * TILE, py + r() * TILE);
            ctx.stroke();
        }
    }

    function drawSprite(ctx, px, py, type, frame) {
        ctx.save();
        ctx.translate(px + TILE / 2, py + TILE / 2);

        if (type === 'player') {
            // Scratchboard figure
            lookScratch(ctx, -7, -11, 14, 22, 0.5);
            ctx.strokeStyle = 'rgba(26,24,22,0.85)';
            ctx.lineWidth = 1.2;
            // Head
            ctx.beginPath();
            ctx.ellipse(0, -8, 3, 4, 0, 0, Math.PI * 2);
            ctx.stroke();
            // Body
            ctx.beginPath();
            ctx.moveTo(0, -4);
            ctx.lineTo(player.dir * 2, 7);
            ctx.stroke();
            // Arms
            ctx.beginPath();
            ctx.moveTo(-1, -1); ctx.lineTo(-5, 2);
            ctx.moveTo(1, -1); ctx.lineTo(5, 2);
            ctx.stroke();
            // Eyes
            if (player.looking) {
                ctx.fillStyle = 'rgba(184,68,42,0.7)';
                ctx.fillRect(player.dir > 0 ? 1 : -3, -9, 1, 1);
            }
        } else if (type === 'mirror') {
            var fl = Math.sin(frame * 0.15) * 0.5;
            ctx.strokeStyle = 'rgba(26,24,22,0.8)';
            ctx.lineWidth = 2;
            ctx.strokeRect(-9 + fl, -13 + fl, 18, 26);
            ctx.strokeRect(-9 - fl, -13 - fl, 18, 26);
            lookScratch(ctx, -7, -11, 14, 22, 0.2, 'rgba(26,24,22,0.15)');
        } else if (type === 'reflection') {
            // Ghost version of player
            ctx.globalAlpha = 0.35;
            lookScratch(ctx, -7, -11, 14, 22, 0.3);
            ctx.strokeStyle = 'rgba(26,24,22,0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.ellipse(0, -8, 3, 4, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, -4);
            ctx.lineTo(-player.dir * 2, 7);
            ctx.stroke();
            ctx.globalAlpha = 1;
        } else if (type === 'objet') {
            var pulse = Math.sin(frame * 0.25) * 2;
            ctx.strokeStyle = '#b8442a';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(pulse, 0, 3 + pulse, 0, Math.PI * 2);
            ctx.stroke();
            lookScratch(ctx, -3, -3, 6, 6, 0.2, 'rgba(184,68,42,0.2)');
        } else if (type === 'gaze') {
            // The Eye
            ctx.strokeStyle = 'rgba(26,24,22,0.9)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(0, 0, 10, 6, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(26,24,22,0.8)';
            ctx.fill();
            lookScratch(ctx, -8, -4, 16, 8, 0.12);
        } else if (type === 'text') {
            ctx.font = '10px "IBM Plex Mono", monospace';
            ctx.fillStyle = 'rgba(122,114,106,0.5)';
            ctx.textAlign = 'center';
            var t = frame < 30 ? '...' : 'the mirror stage';
            ctx.fillText(t, 0, 0);
        }

        ctx.restore();
    }

    function getTile(x, y) {
        if (x < 0 || x >= RW || y < 0 || y >= RH) return 1;
        return map[y][x];
    }

    function update(dt) {
        if (state !== 'playing') return;
        frame++;
        moveTimer += dt;

        // Input
        var dx = 0, dy = 0;
        if (keys['arrowleft'] || keys['a'] || tkeys['left']) dx = -1;
        if (keys['arrowright'] || keys['d'] || tkeys['right']) dx = 1;
        if (keys['arrowup'] || keys['w'] || tkeys['up']) dy = -1;
        if (keys['arrowdown'] || keys['s'] || tkeys['down']) dy = 1;

        if (dx !== 0 || dy !== 0) {
            if (dx !== 0) player.dir = dx > 0 ? 1 : -1;
            player.looking = (dx !== 0 || dy !== 0);

            if (moveTimer >= moveCD) {
                var nx = player.x + dx;
                var ny = player.y + dy;

                if (getTile(nx, ny) === 0) {
                    player.x = nx;
                    player.y = ny;
                    moveTimer = 0;
                }
            }
        } else {
            // Not moving
            player.looking = false;
        }

        // Mirror logic: reflection follows player
        var refl = elements.find(function(e) { return e.type === 'reflection'; });
        if (refl) {
            if (frame % 30 === 0) {
                var rdx = Math.sign(player.x - refl.x);
                var rdy = Math.sign(player.y - refl.y);
                var rnx = refl.x + rdx;
                var rny = refl.y + rdy;
                if (getTile(rnx, rny) === 0) {
                    refl.x = rnx;
                    refl.y = rny;
                } else if (getTile(refl.x + rdy, refl.y - rdx) === 0) {
                    refl.x = refl.x + rdy;
                    refl.y = refl.y - rdx;
                }
            }
            // Death if reflection catches player
            if (Math.abs(player.x - refl.x) < 1.5 && Math.abs(player.y - refl.y) < 1.5 && player.looking) {
                deathMsg = 'your reflection caught you. you looked.';
                die();
            }
        }

        // Drive logic: objet a shifts room walls
        var objet = elements.find(function(e) { return e.type === 'objet'; });
        if (objet) {
            if (frame % 60 === 0) {
                objet.shift++;
                var wx, wy, att = 0;
                do {
                    wx = 2 + Math.floor(r() * (RW - 4));
                    wy = 2 + Math.floor(r() * (RH - 4));
                    att++;
                } while ((wx === player.x && wy === player.y) && att < 10);
                if (att < 10) {
                    map[wy][wx] = map[wy][wx] === 0 ? 1 : 0;
                }
                // Move objet further away
                objet.x = Math.max(2, Math.min(RW - 2, objet.x + player.dir * 2));
            }
        }

        // Gaze logic
        if (roomType === 'gaze') {
            gazeT += dt;
            if (gazeT > 4000 && !gazeOn) {
                gazeOn = true;
                gazeX = player.x + (player.dir > 0 ? 6 : -6);
                gazeY = player.y + Math.floor((r() - 0.5) * 6);
                if (gazeX < 1) gazeX = 1;
                if (gazeX >= RW - 1) gazeX = RW - 2;
                if (gazeY < 1) gazeY = 1;
                if (gazeY >= RH - 1) gazeY = RH - 2;
            }
            if (gazeOn) {
                // Death if gaze catches player standing still
                if (dx === 0 && dy === 0 && gazeT > 8000) {
                    deathMsg = 'you stood still. the Real looked back.';
                    die();
                }
                if (gazeT > 15000) {
                    deathMsg = 'the gaze does not blink. eventually it found you.';
                    die();
                }
            }
        }

        // Check exit
        var ex = exits[0];
        if (player.x === ex.x && player.y === ex.y) {
            room++;
            makeMap();
        }

        // Camera
        var tcx = player.x - VW / 2;
        var tcy = player.y - VH / 2;
        cam.x += (tcx - cam.x) * 0.08;
        cam.y += (tcy - cam.y) * 0.08;
        cam.x = Math.max(0, Math.min(RW - VW, cam.x));
        cam.y = Math.max(0, Math.min(RH - VH, cam.y));
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#f5f2ed';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        var sx = Math.floor(cam.x), sy = Math.floor(cam.y);
        var ex = Math.min(sx + VW + 1, RW), ey = Math.min(sy + VH + 1, RH);

        for (var y = sy; y < ey; y++) {
            for (var x = sx; x < ex; x++) {
                var px = (x - cam.x) * TILE;
                var py = (y - cam.y) * TILE;
                if (map[y][x] === 1) drawWall(ctx, px, py);
                else drawFloor(ctx, px, py);
            }
        }

        // Exit marker
        var e = exits[0];
        var exPx = (e.x - cam.x) * TILE;
        var eyPy = (e.y - cam.y) * TILE;
        ctx.fillStyle = 'rgba(184,68,42,0.2)';
        ctx.fillRect(exPx, eyPy, TILE, TILE);
        ctx.strokeStyle = 'rgba(184,68,42,0.5)';
        ctx.lineWidth = 1;
        ctx.strokeRect(exPx + 2, eyPy + 2, TILE - 4, TILE - 4);

        // Elements
        for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            if (el.type === 'text' && el.read) continue;
            var ePx = (el.x - cam.x) * TILE;
            var ePy = (el.y - cam.y) * TILE;

            // Distance-based fade
            var dist = Math.abs(player.x - el.x) + Math.abs(player.y - el.y);
            if (dist > VW / 2 + 2) continue;

            drawSprite(ctx, ePx, ePy, el.type, frame);
        }

        // Player
        var pPx = (player.x - cam.x) * TILE;
        var pPy = (player.y - cam.y) * TILE;
        drawSprite(ctx, pPx, pPy, 'player', frame);

        // Gaze overlay
        if (gazeOn) {
            var gPx = (gazeX - cam.x) * TILE;
            var gPy = (gazeY - cam.y) * TILE;
            drawSprite(ctx, gPx, gPy, 'gaze', frame);
            // Screen tint
            ctx.fillStyle = 'rgba(26,24,22,' + (0.02 + Math.sin(Date.now() * 0.005) * 0.02) + ')';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Room type indicator
        var rt = document.getElementById('room-text');
        if (roomType === 'mirror') rt.textContent = "don't look at your reflection";
        else if (roomType === 'drive') rt.textContent = "the object always moves ahead";
        else if (roomType === 'gaze') rt.textContent = "keep moving";
        else rt.textContent = '';

        // UI
        document.getElementById('ui-run').textContent = 'run ' + run;
        document.getElementById('ui-room').textContent = String(room + 1);
    }

    function die() {
        state = 'dead';
        document.getElementById('death-msg').textContent = deathMsg;
        document.getElementById('death-stats').textContent = 'run ' + run + ' &middot; room ' + (room + 1);
        document.getElementById('death-screen').classList.remove('hidden');
    }

    function startGame() {
        document.getElementById('title-screen').classList.add('hidden');
        document.getElementById('death-screen').classList.add('hidden');
        state = 'playing';
        seed = Date.now();
        r = rng(seed);
        frame = 0; moveTimer = 0; gazeT = 0; gazeOn = false; room = 0;
        makeMap();
    }

    // Input handlers
    window.addEventListener('keydown', function(e) {
        keys[e.key.toLowerCase()] = true;
        if (['arrowleft','arrowright','arrowup','arrowdown',' '].indexOf(e.key.toLowerCase()) !== -1) e.preventDefault();
    });
    window.addEventListener('keyup', function(e) { keys[e.key.toLowerCase()] = false; });

    // Touch
    var btns = document.querySelectorAll('.touch-btn');
    for (var i = 0; i < btns.length; i++) {
        (function(btn) {
            var k = btn.getAttribute('data-key');
            btn.addEventListener('touchstart', function(e) { e.preventDefault(); tkeys[k] = true; });
            btn.addEventListener('touchend', function(e) { e.preventDefault(); tkeys[k] = false; });
            btn.addEventListener('touchcancel', function(e) { tkeys[k] = false; });
        })(btns[i]);
    }

    // Buttons
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', function() {
        run++;
        startGame();
    });

    // Game loop
    var last = 0;
    function loop(ts) {
        var dt = ts - last;
        last = ts;
        if (dt > 100) dt = 16;
        update(dt);
        render();
        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
    </script>
</body>
</html>
