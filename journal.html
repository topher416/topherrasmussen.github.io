<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal — Topher Rasmussen</title>
    <meta name="description" content="Fragments, dated. Unfinished thoughts about AI, psychoanalysis, writing, and the gap between thinking and publishing.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,700&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/site.css">
</head>
<body>
    <nav class="room-nav">
        <a href="/" class="room-nav__home">TR</a>
        <a href="/theater.html" class="room-nav__link">Theater</a>
        <a href="/writing.html" class="room-nav__link">Writing</a>
        <a href="/start-here.html" class="room-nav__link">Start Here</a>
        <a href="/music.html" class="room-nav__link">Music</a>
        <a href="/journal.html" class="room-nav__link room-nav__link--active">Journal</a>
        <a href="/visual.html" class="room-nav__link">Visual</a>
        <a href="/experiments.html" class="room-nav__link">Experiments</a>
    </nav>

    <main class="room">
        <header class="room__header">
            <h1 class="room__title">Journal</h1>
            <p class="room__subtitle">Fragments, dated. Not essays. Not posts. Just the things I sat down and couldn't leave inside a terminal.</p>
        </header>

        <div id="journal-entries"></div>
    </main>

    <footer class="room-footer">
        <div class="counter">
            Visitor count: <span class="counter-display">00000000</span>
        </div>
    </footer>

    <script>
    (function () {
        var container = document.getElementById('journal-entries');
        if (!container) return;

        fetch('/journal.json')
            .then(function (res) { return res.json(); })
            .then(function (entries) {
                entries.sort(function (a, b) {
                    if (a.datetime && b.datetime) return b.datetime.localeCompare(a.datetime);
                    return b.date.localeCompare(a.date);
                });

                var html = '';
                entries.forEach(function (entry) {
                    html += '<article class="journal-entry">';
                    html += '<header class="journal-entry__header">';
                    html += '<time class="journal-entry__date" datetime="' + entry.date + '">' + entry.display_date + '</time>';
                    html += '</header>';
                    html += '<h2 class="journal-entry__title">' + entry.title + '</h2>';
                    html += '<div class="journal-entry__body">';

                    if (entry.body) {
                        entry.body.forEach(function (paragraph, idx) {
                            if (entry.meta_index === idx) {
                                html += '<p class="journal-entry__meta">' + paragraph + '</p>';
                            } else {
                                html += '<p>' + paragraph + '</p>';
                            }
                        });
                    }

                    html += '</div>';
                    html += '</article>';
                });

                container.innerHTML = html;
            })
            .catch(function () {
                container.innerHTML = '<p class="room-placeholder__text">Could not load journal entries.</p>';
            });
    })();
    </script>

    <script>
    window.displayCount = function (count) {
        var el = document.querySelector('.counter-display');
        if (el) el.textContent = count.toString().padStart(8, '0');
    };
    document.addEventListener('DOMContentLoaded', function () {
        var s = document.createElement('script');
        var t = new Date().getTime();
        s.src = 'https://script.google.com/macros/s/AKfycbwOYJRKO_zOwkLpCR4U_ENMiD7bgPtuWmXVe6ZTuT913aTHJ0c5Op3OEdfzJQAGUHdv/exec?action=increment&callback=displayCount&t=' + t;
        document.body.appendChild(s);
    });
    </script>
</body>
</html>
